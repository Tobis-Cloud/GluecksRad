<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1">
    <title>Neon Glücksrad Pro</title>
    
    <!-- App Icons Integration -->
    <link rel="icon" type="image/jpeg" href="Rad.jpeg">
    <link rel="apple-touch-icon" type="image/jpeg" href="Rad.jpeg">
    
    <style>
        :root {
            --bg-black: #000000;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            
            /* Neon Pastell Akzente */
            --neon-purple: #b666ff;
            --neon-blue: #3b82f6;
            --neon-orange: #ff9f0a;
            --neon-green: #30d158;
            --neon-red: #ff3b30;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Ambient Glow Aura */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(182, 102, 255, 0.08) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Hamburger Menu Button */
        .menu-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 30px;
            height: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 100;
        }

        .menu-toggle span {
            display: block;
            width: 100%;
            height: 3px;
            background-color: var(--text-white);
            border-radius: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* Kreuz-Animation */
        .menu-toggle.open span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
            background-color: var(--neon-purple);
        }
        .menu-toggle.open span:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.open span:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
            background-color: var(--neon-purple);
        }

        /* Haupt-Layout */
        .main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* Glassmorphismus Haupt-Karte */
        .wheel-panel {
            background: rgba(8, 8, 8, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        @media (max-width: 600px) {
            .wheel-panel {
                padding: 20px;
                border-radius: 20px;
            }
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(182, 102, 255, 0.4);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 20px;
                margin-bottom: 15px;
            }
        }

        .wheel-box {
            position: relative;
            width: 420px;
            height: 420px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .wheel-box {
                width: 280px;
                height: 280px;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 360px) {
            .wheel-box {
                width: 220px;
                height: 220px;
            }
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        /* WEISSER, GRÖSSERER UND SPITZERER PFEIL */
        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;  /* Schmaler für die Spitzen-Form */
            border-right: 14px solid transparent; /* Schmaler für die Spitzen-Form */
            border-top: 35px solid var(--text-white); /* Länger gezogen und reinweiß */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)); /* Weißer Neon Glow */
            z-index: 10;
        }

        @media (max-width: 600px) {
            .wheel-pointer {
                top: -10px;
                border-left: 10px solid transparent;
                border-right: 10px solid transparent;
                border-top: 26px solid var(--text-white);
            }
        }

        /* Spin Button */
        .btn-spin {
            background: transparent;
            border: 1px solid rgba(182, 102, 255, 0.6);
            color: var(--text-white);
            border-radius: 12px;
            padding: 16px 50px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: breathingGlow 3s infinite ease-in-out;
        }

        @media (max-width: 600px) {
            .btn-spin {
                padding: 12px 35px;
                font-size: 13px;
            }
        }

        .btn-spin:hover {
            background: rgba(182, 102, 255, 0.15);
            box-shadow: 0 0 25px rgba(182, 102, 255, 0.6);
        }

        .btn-spin:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            animation: none;
        }

        @keyframes breathingGlow {
            0% { box-shadow: 0 0 12px rgba(182, 102, 255, 0.25); }
            50% { box-shadow: 0 0 22px rgba(182, 102, 255, 0.55); }
            100% { box-shadow: 0 0 12px rgba(182, 102, 255, 0.25); }
        }

        .winner-display {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 1px;
            height: 30px;
            text-align: center;
        }

        /* Slide-Over Panel */
        .slide-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(12, 12, 12, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.8);
            z-index: 90;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 80px 25px 30px 25px;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 450px) {
            .slide-panel {
                width: 100vw;
                right: -100vw;
            }
        }

        .slide-panel.open {
            right: 0;
        }

        .label-style {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
        }

        .extra-settings-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .options-list {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: none;
            padding-right: 5px;
            margin-bottom: 20px;
        }

        .options-list::-webkit-scrollbar {
            width: 4px;
        }
        .options-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .option-row {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
        }

        .row-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-white);
            font-size: 15px;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
            -webkit-user-select: text;
            user-select: text;
        }

        input[type="text"]:focus {
            border-color: var(--active-color, var(--neon-purple));
            box-shadow: 0 0 15px rgba(var(--active-color-rgb), 0.35);
        }

        .percent-display {
            font-size: 15px;
            font-weight: bold;
            min-width: 45px;
            text-align: right;
        }

        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--active-color, var(--neon-purple));
            cursor: pointer;
            margin-top: -9px;
            box-shadow: 0 0 10px var(--active-color, var(--neon-purple));
        }

        /* Buttons */
        .btn-add {
            background: transparent;
            border: 1px solid rgba(48, 209, 88, 0.4);
            color: var(--text-white);
            border-radius: 12px;
            padding: 14px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
        }

        .btn-add:hover {
            background: rgba(48, 209, 88, 0.1);
            box-shadow: 0 0 15px rgba(48, 209, 88, 0.3);
        }

        .btn-delete {
            background: transparent;
            border: 1px solid rgba(255, 59, 48, 0.4);
            color: var(--text-white);
            border-radius: 12px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .btn-delete:hover {
            background: rgba(255, 59, 48, 0.14);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.3);
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <!-- Drei-Striche-Menü-Button -->
    <div class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Hauptansicht -->
    <div class="main-content">
        <div class="wheel-panel">
            <h1>Glücksrad</h1>
            <div class="wheel-box">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="spinWheel()">Drehen</button>
            <div class="winner-display" id="winnerDisplay"></div>
        </div>
    </div>

    <!-- Slide-Over Sidebar -->
    <div class="slide-panel" id="slidePanel">
        <!-- Animations-Dauer Regler -->
        <div class="extra-settings-box" style="--active-color: var(--neon-blue);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span class="label-style" style="margin:0;">Drehdauer</span>
                <span id="durationDisplay" style="font-size: 13px; font-weight: bold; color: var(--neon-blue);">3.5s</span>
            </div>
            <input type="range" id="durationSlider" min="2" max="6" step="0.5" value="3.5" oninput="updateDuration(this.value)">
        </div>

        <div style="margin-bottom: 12px; display:flex; justify-content:space-between; align-items:center;">
            <span class="label-style" style="margin:0;">Optionen & Verteilung</span>
            <span class="label-style" id="totalPercentDisplay" style="margin:0;">100%</span>
        </div>
        
        <div class="options-list" id="optionsContainer">
            <!-- Einträge -->
        </div>

        <button class="btn-add" onclick="addOption()">Option Hinzufügen</button>
    </div>

    <script>
        // Verhindere Zoom durch Tastenkombinationen und Gesten
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        }, false);

        document.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        const neonColors = [
            { hex: '#b666ff', rgb: '182, 102, 255' },
            { hex: '#3b82f6', rgb: '59, 130, 246' },
            { hex: '#ff9f0a', rgb: '255, 159, 10' },
            { hex: '#30d158', rgb: '48, 209, 88' },
            { hex: '#ff3b30', rgb: '255, 59, 48' }
        ];

        let options = [];
        let spinDuration = 3.5;
        let isSpinning = false;
        let currentRotation = 0;
        
        let interactionHistory = []; 

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        // Initialisierung
        window.addEventListener('DOMContentLoaded', () => {
            const savedOptions = localStorage.getItem('wheelOptionsV4');
            const savedDuration = localStorage.getItem('wheelDurationV4');

            if (savedOptions) {
                try { options = JSON.parse(savedOptions); } catch(e) { setDefaultOptions(); }
            } else {
                setDefaultOptions();
            }

            if (savedDuration) {
                spinDuration = parseFloat(savedDuration);
            }

            interactionHistory = options.map(o => o.id);

            document.getElementById('durationSlider').value = spinDuration;
            document.getElementById('durationDisplay').innerText = spinDuration + 's';
            updateCanvasTransitionTime();

            renderOptionsList();
            drawWheel();
        });

        function setDefaultOptions() {
            options = [
                { id: 1, text: 'Option A', percent: 40 },
                { id: 2, text: 'Option B', percent: 30 },
                { id: 3, text: 'Option C', percent: 30 }
            ];
        }

        function saveData() {
            localStorage.setItem('wheelOptionsV4', JSON.stringify(options));
            localStorage.setItem('wheelDurationV4', spinDuration);
        }

        function toggleMenu() {
            document.getElementById('menuToggle').classList.toggle('open');
            document.getElementById('slidePanel').classList.toggle('open');
        }

        function updateDuration(val) {
            spinDuration = parseFloat(val);
            document.getElementById('durationDisplay').innerText = spinDuration + 's';
            updateCanvasTransitionTime();
            saveData();
        }

        function updateCanvasTransitionTime() {
            canvas.style.transition = `transform ${spinDuration}s cubic-bezier(0.1, 0.8, 0.1, 1)`;
        }

        function renderOptionsList() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            options.forEach((opt, index) => {
                const colorObj = neonColors[index % neonColors.length];
                
                const row = document.createElement('div');
                row.className = 'option-row';
                row.style.setProperty('--active-color', colorObj.hex);
                row.style.setProperty('--active-color-rgb', colorObj.rgb);

                row.innerHTML = `
                    <div class="row-controls">
                        <div class="input-group">
                            <input type="text" value="${opt.text}" oninput="updateText(${opt.id}, this.value)">
                            <div class="percent-display" id="label-${opt.id}" style="color: ${colorObj.hex}">${opt.percent}%</div>
                        </div>
                        <input type="range" min="0" max="100" step="1" value="${opt.percent}" 
                            oninput="handleSliderVisual('${opt.id}', this.value)"
                            onchange="handleSliderCalculation(${opt.id}, this.value)">
                    </div>
                    <button class="btn-delete" onclick="deleteOption(${opt.id})" ${options.length <= 2 ? 'disabled style="opacity:0.2; cursor:not-allowed;"' : ''}>&times;</button>
                `;
                container.appendChild(row);
            });
            
            updateTotalDisplay();
        }

        function handleSliderVisual(id, val) {
            const displayLabel = document.getElementById(`label-${id}`);
            if (displayLabel) {
                displayLabel.innerText = val + '%';
            }
        }

        function handleSliderCalculation(id, newValue) {
            newValue = parseInt(newValue, 10);
            const targetIndex = options.findIndex(o => o.id === id);
            const oldValue = options[targetIndex].percent;
            
            if (oldValue === newValue) return;

            interactionHistory = interactionHistory.filter(histId => histId !== id);
            interactionHistory.push(id);

            options[targetIndex].percent = newValue;
            let diff = oldValue - newValue; 

            let passiveCandidates = interactionHistory.filter(histId => histId !== id);

            if (diff > 0) {
                for (let i = 0; i < passiveCandidates.length; i++) {
                    let pId = passiveCandidates[i];
                    let pIdx = options.findIndex(o => o.id === pId);
                    if (pIdx !== -1 && options[pIdx].percent < 100) {
                        let space = 100 - options[pIdx].percent;
                        let add = Math.min(diff, space);
                        options[pIdx].percent += add;
                        diff -= add;
                        if (diff === 0) break;
                    }
                }
            } else if (diff < 0) {
                for (let i = 0; i < passiveCandidates.length; i++) {
                    let pId = passiveCandidates[i];
                    let pIdx = options.findIndex(o => o.id === pId);
                    if (pIdx !== -1 && options[pIdx].percent > 0) {
                        let sub = Math.min(Math.abs(diff), options[pIdx].percent);
                        options[pIdx].percent -= sub;
                        diff += sub;
                        if (diff === 0) break;
                    }
                }
            }

            let currentSum = options.reduce((sum, o) => sum + o.percent, 0);
            if (currentSum !== 100 && passiveCandidates.length > 0) {
                let fix = 100 - currentSum;
                let fallbackIdx = options.findIndex(o => o.id === passiveCandidates[0]);
                if (fallbackIdx !== -1 && options[fallbackIdx].percent + fix >= 0 && options[fallbackIdx].percent + fix <= 100) {
                    options[fallbackIdx].percent += fix;
                }
            }

            saveData();
            renderOptionsList(); 
            drawWheel();
        }

        function updateTotalDisplay() {
            const total = options.reduce((sum, o) => sum + o.percent, 0);
            document.getElementById('totalPercentDisplay').innerText = `${total}%`;
        }

        function updateText(id, value) {
            const opt = options.find(o => o.id === id);
            if (opt) {
                opt.text = value;
                saveData();
                drawWheel();
            }
        }

        function addOption() {
            if (options.length >= 10) return; 
            const newId = options.length > 0 ? Math.max(...options.map(o => o.id)) + 1 : 1;
            
            let newPercent = Math.floor(100 / (options.length + 1));
            let rem = 100 - newPercent;

            let currentSum = options.reduce((sum, o) => sum + o.percent, 0);
            if (currentSum > 0) {
                options.forEach(o => {
                    o.percent = Math.round((o.percent / currentSum) * rem);
                });
            }

            options.push({
                id: newId,
                text: `Option ${String.fromCharCode(65 + options.length)}`,
                percent: newPercent
            });

            let finalSum = options.reduce((sum, o) => sum + o.percent, 0);
            if (finalSum !== 100) {
                options[0].percent += (100 - finalSum);
            }

            if (!interactionHistory.includes(newId)) {
                interactionHistory.unshift(newId);
            }

            saveData();
            renderOptionsList();
            drawWheel();
        }

        function deleteOption(id) {
            if (options.length <= 2) return;
            const targetIndex = options.findIndex(o => o.id === id);
            const removedPercent = options[targetIndex].percent;
            
            options.splice(targetIndex, 1);
            interactionHistory = interactionHistory.filter(histId => histId !== id);

            let rem = removedPercent;
            while (rem > 0) {
                for (let i = 0; i < options.length; i++) {
                    if (rem > 0) {
                        options[i].percent++;
                        rem--;
                    }
                }
            }

            saveData();
            renderOptionsList();
            drawWheel();
        }

        function drawWheel() {
            const size = canvas.width;
            const center = size / 2;
            const radius = center - 15;
            
            ctx.clearRect(0, 0, size, size);
            let startAngle = 0;

            options.forEach((opt, index) => {
                if (opt.percent <= 0) return;

                const sliceAngle = (opt.percent / 100) * (2 * Math.PI);
                const colorObj = neonColors[index % neonColors.length];

                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, startAngle, startAngle + sliceAngle);
                ctx.closePath();

                ctx.fillStyle = colorObj.hex;
                ctx.globalAlpha = 0.85;
                ctx.fill();
                ctx.globalAlpha = 1.0;

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(startAngle + sliceAngle / 2);
                
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 44px -apple-system, BlinkMacSystemFont, sans-serif";
                
                ctx.shadowBlur = 6;
                ctx.shadowColor = colorObj.hex;

                if (opt.percent > 4) {
                    let txt = opt.text;
                    if (txt.length > 10) txt = txt.substring(0, 8) + '...';
                    ctx.fillText(txt, radius - 55, 0);
                }
                ctx.restore();

                startAngle += sliceAngle;
            });

            ctx.beginPath();
            ctx.arc(center, center, 24, 0, 2 * Math.PI);
            ctx.fillStyle = '#080808';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function spinWheel() {
            if (isSpinning) return;

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('winnerDisplay').innerText = '';

            const rand = Math.random() * 100;
            let cumulativePercent = 0;
            let winnerIndex = 0;

            for (let i = 0; i < options.length; i++) {
                cumulativePercent += options[i].percent;
                if (rand <= cumulativePercent) {
                    winnerIndex = i;
                    break;
                }
            }

            let startDegrees = 0;
            for (let i = 0; i < winnerIndex; i++) {
                startDegrees += (options[i].percent / 100) * 360;
            }
            const segmentSizeDegrees = (options[winnerIndex].percent / 100) * 360;
            const targetCenterDegrees = startDegrees + (segmentSizeDegrees / 2);

            const rotationToTarget = (270 - targetCenterDegrees + 360) % 360;
            const extraSpins = 6 + Math.floor(Math.random() * 3);
            
            const currentNormalized = currentRotation % 360;
            const targetRotationIncrease = (extraSpins * 360) + ((rotationToTarget - currentNormalized + 360) % 360);
            
            currentRotation += targetRotationIncrease;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                
                const winner = options[winnerIndex];
                const display = document.getElementById('winnerDisplay');
                display.innerHTML = `Gewonnen: <span style="font-weight:bold; color:${neonColors[winnerIndex % neonColors.length].hex}">${winner.text}</span>`;
            }, spinDuration * 1000);
        }
    </script>
</body>
</html>
